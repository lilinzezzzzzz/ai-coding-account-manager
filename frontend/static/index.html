<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Coding Account Manager</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/app.css?v=split-modules">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">AI</div>
          <div class="brand-copy">
            <p class="brand-eyebrow">LOCAL CONTROL CENTER</p>
            <h1>AI Coding Account Manager</h1>
            <p class="brand-subtitle">集中管理本地 AI Coding 账号、凭据与使用额度</p>
          </div>
        </div>
        <div class="local-badge"><span aria-hidden="true"></span>本地管理</div>
      </header>

      <section id="message" class="message" role="status" aria-live="polite" hidden></section>

      <section id="providers" class="provider-list" aria-label="Providers"></section>
    </main>
    <script type="module" src="/app.js?v=components"></script>
  </body>
</html>
